global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # On utilise le nom exact du service Docker Compose
            - 'logiciel-alertmanager:9093'

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'Ser-test'
    static_configs:
      - targets: ['logiciel-node-exporter:9100']
  
  - job_name: 'Node1'
    static_configs:
      - targets: ['192.168.100.7:9100']

  - job_name: 'Node2'
    static_configs:
      - targets: ['192.168.100.8:9100']
